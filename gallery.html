<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | The Panchi House</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <!-- AOS Animation Library -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <!-- Main Style -->
    <link rel="stylesheet" href="css/style.css">
    <meta name="description"
        content="The Panchi House – Luxury dining restaurant in Moula Ali, Secunderabad. Experience royal ambience, premium food, and unforgettable celebrations.">

    <meta name="keywords"
        content="Restaurant in Moula Ali, Fine Dining Secunderabad, Family Restaurant Hyderabad, Luxury Dining Telangana">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>

    <!-- Header / Navigation -->
    <nav class="navbar scrolled">
        <div class="container nav-content">
            <div class="logo">
                <a href="index.html">The Panchi <span>House</span></a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Services</a></li>
                <li><a href="gallery.html" class="active">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="contact.html#reserve" class="btn-primary nav-btn">Reserve</a></li>
            </ul>
        </div>
    </nav>

    <!-- Page Header -->
    <section class="page-header"
        style="background: linear-gradient(rgba(10,10,10,0.7), rgba(10,10,10,0.7)), url('https://images.unsplash.com/photo-1543007630-9710e4a00a20?auto=format&fit=crop&w=1500&q=80') center/cover;">
        <div class="container" data-aos="fade-up">
            <h1 class="luxury-heading">Visual <span>Gallery</span></h1>
            <p>A glimpse into the cinematic soul of The Panchi House.</p>
        </div>
    </section>

    <!-- Gallery Section -->
    <section class="gallery">
        <div class="container">
            <!-- Category Filters -->
            <div class="gallery-filters" data-aos="fade-up">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="ambience">Ambience</button>
                <button class="filter-btn" data-filter="dining">Dining</button>
                <button class="filter-btn" data-filter="celebrations">Celebrations</button>
                <button class="filter-btn" data-filter="signatures">Signature Dishes</button>
            </div>

            <!-- Masonry Grid -->
            <div class="masonry-grid" data-aos="fade-up">
                <div class="gallery-item ambience">
                    <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?auto=format&fit=crop&w=800&q=80"
                        alt="Interior 1">
                    <div class="gallery-overlay"><span>Ambience</span></div>
                </div>
                <div class="gallery-item signatures">
                    <img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=800&q=80"
                        alt="Dish 1">
                    <div class="gallery-overlay"><span>Signature Dishes</span></div>
                </div>
                <div class="gallery-item celebrations">
                    <img src="https://images.unsplash.com/photo-1519671482749-fd09be7ccebf?auto=format&fit=crop&w=800&q=80"
                        alt="Event 1">
                    <div class="gallery-overlay"><span>Celebrations</span></div>
                </div>
                <div class="gallery-item dining">
                    <img src="https://images.unsplash.com/photo-1550966841-39ca7106dc4a?auto=format&fit=crop&w=800&q=80"
                        alt="Interior 2">
                    <div class="gallery-overlay"><span>Dining</span></div>
                </div>
                <div class="gallery-item signatures">
                    <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?auto=format&fit=crop&w=800&q=80"
                        alt="Dessert">
                    <div class="gallery-overlay"><span>Signature Dishes</span></div>
                </div>
                <div class="gallery-item celebrations">
                    <img src="https://images.unsplash.com/photo-1511795409834-ef04bbd61622?auto=format&fit=crop&w=800&q=80"
                        alt="Event 2">
                    <div class="gallery-overlay"><span>Celebrations</span></div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container footer-content">
            <div class="footer-logo">
                <a href="index.html">The Panchi <span>House</span></a>
            </div>
            <p>&copy; 2026 The Panchi House. All rights reserved.</p>
        </div>
    </footer>

    <!-- JS Scripts -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="js/script.js"></script>
    <script>
        AOS.init();
    </script>
</body>

</html>
